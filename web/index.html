<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SakuraMedia">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sakuramedia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sakuramedia</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 首屏加载遮罩: 盖住 Flutter 启动首帧, 避免裸露背景与字体闪烁。
       Flutter 渲染首帧时内嵌字体已加载完成, 中日文不会再是方块字。 */
    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F5F5;
      transition: opacity 0.3s ease;
    }
    #app-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E8D8D3;
      border-top-color: #6B2D2A;
      border-radius: 50%;
      animation: app-loading-spin 0.8s linear infinite;
    }
    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-loading"><div class="spinner"></div></div>
  <script>
    // Flutter 首帧渲染完成后淡出并移除遮罩。
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('app-loading');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function () { el.remove(); }, 300);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
