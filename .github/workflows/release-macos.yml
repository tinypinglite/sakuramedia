name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build macOS zip and publish release
    runs-on: macos-latest

    env:
      APP_NAME: sakuramedia
      ARCHIVE_NAME: sakuramedia-macos-${{ github.ref_name }}-unsigned.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests before release
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package unsigned app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/${APP_NAME}.app" \
            "dist/${ARCHIVE_NAME}"
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ github.ref_name }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: sakuramedia ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
