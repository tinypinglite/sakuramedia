name: Release iOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build iOS IPA and publish release
    runs-on: macos-latest

    env:
      ARCHIVE_NAME: sakuramedia-ios-${{ github.ref_name }}-unsigned.ipa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests before release
        run: flutter test

      - name: Build iOS IPA (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Collect unsigned iOS IPA
        run: |
          mkdir -p dist
          ipa_dir="build/ios/ipa"
          shopt -s nullglob
          ipas=("${ipa_dir}"/*.ipa)
          shopt -u nullglob

          if [ "${#ipas[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one .ipa in ${ipa_dir}, found ${#ipas[@]}"
            ls -la "${ipa_dir}" || true
            printf 'Matched .ipa entries:\n'
            if [ "${#ipas[@]}" -gt 0 ]; then
              printf '  %s\n' "${ipas[@]}"
            else
              echo '  (none)'
            fi
            exit 1
          fi

          cp "${ipas[0]}" "dist/${ARCHIVE_NAME}"
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.ref_name }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: sakuramedia ${{ github.ref_name }}
          # Keep release notes generation in macOS workflow only to avoid duplicate
          # "What's Changed" sections when multiple workflows publish the same tag.
          generate_release_notes: false
          files: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
