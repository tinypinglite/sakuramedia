name: Release iOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build iOS IPA and publish release
    runs-on: macos-latest

    env:
      ARCHIVE_NAME: sakuramedia-ios-${{ github.ref_name }}-unsigned.ipa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests before release
        run: flutter test

      - name: Build iOS app archive input (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Collect unsigned iOS IPA
        run: |
          mkdir -p dist
          app_dir="build/ios/iphoneos"
          shopt -s nullglob
          apps=("${app_dir}"/*.app)
          shopt -u nullglob

          if [ "${#apps[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one .app in ${app_dir}, found ${#apps[@]}"
            ls -la "${app_dir}" || true
            printf 'Matched .app entries:\n'
            if [ "${#apps[@]}" -gt 0 ]; then
              printf '  %s\n' "${apps[@]}"
            else
              echo '  (none)'
            fi
            exit 1
          fi

          payload_root="$(mktemp -d)"
          trap 'rm -rf "${payload_root}"' EXIT
          mkdir -p "${payload_root}/Payload"
          cp -R "${apps[0]}" "${payload_root}/Payload/"

          archive_path="$(pwd)/dist/${ARCHIVE_NAME}"
          rm -f "${archive_path}"
          (
            cd "${payload_root}"
            zip -qry "${archive_path}" Payload
          )

          shasum -a 256 "${archive_path}" > "${archive_path}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.ref_name }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: sakuramedia ${{ github.ref_name }}
          # Keep release notes generation in macOS workflow only to avoid duplicate
          # "What's Changed" sections when multiple workflows publish the same tag.
          generate_release_notes: false
          files: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
